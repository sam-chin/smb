name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Fix gradlew line endings
      run: |
        # Convert to Unix line endings if needed
        if command -v dos2unix &> /dev/null; then
          dos2unix gradlew 2>/dev/null || true
        fi
        # Ensure shebang is correct
        sed -i '1s|^#!/bin/sh$|#!/bin/sh|' gradlew
        sed -i '1s|^#!/bin/bash$|#!/bin/bash|' gradlew 2>/dev/null || true
        # Set execute permission
        chmod +x gradlew

    - name: Build with Gradle
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload build outputs
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Fix gradlew line endings
      run: |
        if command -v dos2unix &> /dev/null; then
          dos2unix gradlew 2>/dev/null || true
        fi
        sed -i '1s|^#!/bin/sh$|#!/bin/sh|' gradlew
        chmod +x gradlew

    - name: Run lint
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        ./gradlew lint --no-daemon
